name: Release & Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build-daemon:
    name: Cross-compile Go daemon
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: daemon/go.sum

      - name: Build all platform binaries
        run: bash scripts/build-daemon.sh

      - name: Pack daemon packages tree
        run: tar czf daemon-packages.tar.gz packages

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-packages
          path: daemon-packages.tar.gz
          if-no-files-found: error

  publish-daemon-packages:
    name: Publish @unfade/daemon-* to npm
    runs-on: ubuntu-latest
    needs: build-daemon

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download daemon artifact
        uses: actions/download-artifact@v4
        with:
          name: daemon-packages
          path: _daemon_artifact

      - name: Extract binaries into packages/
        run: tar xzf _daemon_artifact/daemon-packages.tar.gz

      - name: Sync platform package versions from root
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for d in packages/daemon-darwin-arm64 packages/daemon-darwin-x64 packages/daemon-linux-arm64 packages/daemon-linux-x64; do
            node -e "
              const fs = require('fs');
              const p = process.argv[1];
              const v = process.argv[2];
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = v;
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            " "$d/package.json" "$VERSION"
          done
          echo "Synced daemon package versions to $VERSION"

      - name: Verify binaries
        run: |
          for d in packages/daemon-darwin-arm64 packages/daemon-darwin-x64 packages/daemon-linux-arm64 packages/daemon-linux-x64; do
            test -x "$d/bin/unfaded" && test -x "$d/bin/unfade-send" || (echo "missing $d/bin" && exit 1)
          done

      - name: Publish each platform package
        run: |
          set -e
          for d in packages/daemon-darwin-arm64 packages/daemon-darwin-x64 packages/daemon-linux-arm64 packages/daemon-linux-x64; do
            echo "Publishing $d ..."
            (cd "$d" && npm publish --access public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: publish-daemon-packages

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: |
          echo "=== Package contents ==="
          npm pack --dry-run
          echo ""
          echo "=== dist/cli.mjs exists ==="
          test -f dist/cli.mjs && echo "OK" || (echo "MISSING" && exit 1)

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
