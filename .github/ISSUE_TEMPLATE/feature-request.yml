name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting how to make Unfade better! Please describe the problem you're trying to solve, not just the solution you want.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered? Why didn't they work?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI commands
        - MCP server / tools
        - Capture engine
        - Distillation
        - TUI dashboard
        - Web UI
        - Thinking Graph / Cards
        - Documentation
        - Other
